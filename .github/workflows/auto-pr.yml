# feat/** 或 fix/** 分支每次 push 时，自动向 master 开 PR；若 PR 已存在则跳过。
#
# 前置配置（一次性）：
#   仓库 Settings → Actions → General → Workflow permissions
#     · 选 "Read and write permissions"
#     · 勾 "Allow GitHub Actions to create and approve pull requests"
#
# 为什么能用 gh 而无需安装 / 登录：
#   GitHub-hosted runner 原生预装 gh CLI；workflow 里的 GITHUB_TOKEN 是每次运行临时下发的，
#   权限范围由上面那条仓库设置控制，无需任何 secret。
#
# 本 workflow 只负责"把 PR 开起来 + 给出 commit 列表骨架 body"。
# PR body 的精修与代码评审由 ai-review.yml 接手（Claude Code Action）。
name: auto-pr

on:
  push:
    branches:
      - 'feat/**'
      - 'fix/**'

concurrency:
  group: auto-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  open-pr:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure master ref available
        run: git fetch origin master --depth=1

      - name: Open PR if not exists
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          existing=$(gh pr list --head "$BRANCH" --base master --state open --json number --jq '.[0].number' || echo '')
          if [ -n "$existing" ]; then
            echo "已存在 PR #$existing，新 commit 会自动追加，ai-review 会重新触发"
            exit 0
          fi

          title=$(git log -1 --pretty='%s')
          commits=$(git log --reverse --pretty='- %s' origin/master..HEAD)
          body=$(cat <<EOF
          自动由 \`auto-pr\` workflow 创建自 \`$BRANCH\` 分支。

          ### 本 PR 包含的提交

          $commits
          EOF
          )

          gh pr create \
            --base master \
            --head "$BRANCH" \
            --title "$title" \
            --body "$body"
